# SPDX-License-Identifier: Apache-2.0
name: Build

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  packages: write
  contents: read
  issues: read
  checks: write
  pull-requests: write
  actions: read
  statuses: write

env:
  LC_ALL: C.UTF-8
  GRADLE_CACHE_USERNAME: ${{ secrets.GRADLE_CACHE_USERNAME }}
  GRADLE_CACHE_PASSWORD: ${{ secrets.GRADLE_CACHE_PASSWORD }}

jobs:
  build:
    name: Build TSS Crypto Library
    runs-on: network-node-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: temurin
          java-version: 21.0.4

      - name: Setup clang-tools (Windows cross-compile)
        run: |
          sudo apt-get update
          sudo apt-get -y install clang-tools-14
          sudo ln -s /usr/bin/clang-cl-14 /usr/bin/clang-cl
          clang-cl -v 

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0bdd871935719febd78681f197cd39af5b6e16a6 # v4.2.2
        with:
          cache-read-only: false

      - name: Build software
        run: ./gradlew assemble

      - name: Code Quality Checks
        run: ./gradlew qualityCheck --continue

      - name: Gradle Unit Test
        run: ./gradlew :aggregation:testCodeCoverageReport test --continue

      - name: Publish Unit Test Results
        uses: step-security/publish-unit-test-result-action@cc82caac074385ae176d39d2d143ad05e1130b2d # v2.18.0
        with:
          files: "**/build/test-results/test/TEST-*.xml"

  test-cross-platform:
    name: Test on ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [windows-2022, macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Standardize Git Line Endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: temurin
          java-version: 21.0.4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0bdd871935719febd78681f197cd39af5b6e16a6 # v4.2.2
        with:
          cache-read-only: false

      - name: Gradle Unit Test
        # We do -PskipInstallRustToolchains=true, because all cargoBuild task results are taken FROM-CACHE
        run: ./gradlew test -PskipInstallRustToolchains=true --continue

  analyze:
    name: Analyze
    uses: ./.github/workflows/zxc-code-analysis.yaml
    needs:
      - build
      - test-cross-platform
    if: ${{ (github.event_name == 'push') && !failure() && !cancelled() }}
    with:
      custom-job-label: Source Code
      enable-snyk-scan: true
      snyk-org-identifier: hedera-services
    secrets:
      snyk-token: ${{ secrets.SNYK_TOKEN }}
