name: Build

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  packages: write
  contents: read
  issues: read
  checks: write
  pull-requests: write
  actions: read
  statuses: write

env:
  LC_ALL: C.UTF-8
  GRADLE_CACHE_USERNAME: ${{ secrets.GRADLE_CACHE_USERNAME }}
  GRADLE_CACHE_PASSWORD: ${{ secrets.GRADLE_CACHE_PASSWORD }}

jobs:
  build:
    name: Build TSS Crypto Library
    runs-on: network-node-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b # v4.5.0
        with:
          distribution: temurin
          java-version: 21.0.4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@cc4fc85e6b35bafd578d5ffbc76a5518407e1af0 # v4.2.1
        with:
          cache-read-only: false

      - name: Build software
        run: ./gradlew assemble --scan

      - name: Spotless Check
        run: ./gradlew spotlessCheck --scan --continue

      - name: Dependency Scopes Check
        run: ./gradlew checkAllModuleInfo --scan --continue

      - name: Gradle Unit Test
        run: ./gradlew :reports:testCodeCoverageReport test --scan --continue

      - name: Publish Unit Test Results
        uses: step-security/publish-unit-test-result-action@cc82caac074385ae176d39d2d143ad05e1130b2d # v2.18.0
        with:
          files: "**/build/test-results/test/TEST-*.xml"

  test-cross-platform:
    name: Test on ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [windows-2022, macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Standardize Git Line Endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b # v4.5.0
        with:
          distribution: temurin
          java-version: 21.0.4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@cc4fc85e6b35bafd578d5ffbc76a5518407e1af0 # v4.2.1
        with:
          cache-read-only: false

      - name: Gradle Unit Test
        run: ./gradlew test -PskipInstallRustToolchains=true --scan --continue

  analyze:
    name: Analyze
    uses: ./.github/workflows/zxc-code-analysis.yaml
    needs:
      - build
      - test-cross-platform
    if: ${{ (github.event_name == 'push') && !failure() && !cancelled() }}
    with:
      custom-job-label: Source Code
      enable-snyk-scan: true
      snyk-org-identifier: hedera-services
    secrets:
      snyk-token: ${{ secrets.SNYK_TOKEN }}
