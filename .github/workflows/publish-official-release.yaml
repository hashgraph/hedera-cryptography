# SPDX-License-Identifier: Apache-2.0
name: "Publish Official Release"

on:
  workflow_dispatch:
    inputs:
      dry-run-enabled:
        description: "Perform Dry Run"
        type: boolean
        required: false
        default: false
      java-distribution:
        description: "Java JDK Distribution:"
        type: string
        required: false
        default: "temurin"
      java-version:
        description: "Java JDK Version:"
        type: string
        required: false
        default: "21.0.4"

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  contents: write
  actions: write
  pages: write

env:
  REGISTRY: ghcr.io
  LC_ALL: C.UTF-8
  GRADLE_CACHE_USERNAME: ${{ secrets.GRADLE_CACHE_USERNAME }}
  GRADLE_CACHE_PASSWORD: ${{ secrets.GRADLE_CACHE_PASSWORD }}

jobs:
  publish:
    name: Publish Official Release of Hedera Cryptography
    runs-on: network-node-linux-medium

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@c95a14d0e5bab51a9f56296a4eb0e416910cd350 # v2.10.3
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          fetch-depth: 0
          ref: "main"

      - name: Setup Java
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b # v4.6.0
        with:
          distribution: ${{ inputs.java-distribution || 'temurin' }}
          java-version: ${{ inputs.java-version || '21.0.4' }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0bdd871935719febd78681f197cd39af5b6e16a6 # v4.2.2
        with:
          gradle-version: wrapper

      - name: Import GPG Key
        uses: step-security/ghaction-import-gpg@6c8fe4d0126a59d57c21f87c9ae5dd3451fa3cca # v6.1.0
        with:
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.GPG_KEY_PASSPHRASE }}

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          echo "Installing semantic-release"
          npm install

      - name: Configure Git for Semantic Release
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"

      # Both actual and dry-run semantic-release will output the new version to version.txt
      # as is defined in .releaserc but actual release should also publish a tag
      - name: Run Semantic Release
        if: ${{ !cancelled() && !failure() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
            echo "Dry Running semantic-release now..."
            npx semantic-release --dry-run
          else
            echo "Running semantic-release now..."
            npx semantic-release
          fi

      - name: Compare version.txt with the tag latest tag and update if needed
        if: ${{ inputs.dry-run-enabled != 'true' && !cancelled() && !failure() }}
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 || echo "")

          FILE_VERSION=$(cat version.txt)

          echo "Latest Git tag: $LATEST_TAG"
          echo "Current version.txt content: $FILE_VERSION"

          if [[ "$FILE_VERSION" != "$LATEST_TAG" ]]; then
            echo "WARNING: version.txt ($FILE_VERSION) does not match the latest tag ($LATEST_TAG)."
            echo "Updating version.txt to match the latest tag."
            echo "$LATEST_TAG" > version.txt
          else
            echo "version.txt is already up to date."
          fi

      - name: Commit and Push version.txt
        if: ${{ inputs.dry-run-enabled != 'true' && !cancelled() && !failure() }}
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9.1.4
        with:
          author_name: ${{ secrets.GIT_USER_NAME }}
          author_email: ${{ secrets.GIT_USER_EMAIL }}
          message: "chore: update version.txt"
          add: "version.txt"
          commit: --signoff

      # This step is used only in dry-run mode to add -SNAPSHOT suffix to version number in version.txt
      - name: Dry Run Apply Gradle Version Number Update (Explicit)
        if: ${{ inputs.dry-run-enabled == 'true' && !cancelled() && !failure() }}
        run: ./gradlew versionAsSnapshot

      # Technically, this step is not required but is executed to provide the end users with a summary of the version
      # numbers assigned to each published artifact.
      - name: Version Report
        run: ./gradlew githubVersionSummary

      # Technically, this step is not required because the release steps will build what is required; however,
      # if one or more components fails to build then it could result in a partial publish to Maven Central.
      # The inclusion of this step ensures the job fails cleanly without publishing to Maven Central if any of the
      # components fail to build.
      - name: Gradle Assemble
        id: gradle-build
        if: ${{ !cancelled() && !failure() }}
        run: ./gradlew assemble

      # Publishes the artifacts to the Maven Central Nexus staging repository.
      - name: Gradle Publish to Maven Central - common
        if: ${{ inputs.dry-run-enabled != 'true' && !cancelled() && !failure() }}
        env:
          NEXUS_USERNAME: ${{ secrets.SVCS_OSSRH_USER_NAME }}
          NEXUS_PASSWORD: ${{ secrets.SVCS_OSSRH_USER_PASSWORD }}
        run: ./gradlew releaseMavenCentral -PpublishingPackageGroup=com.hedera.common -PpublishSigningEnabled=true --no-configuration-cache

      - name: Gradle Publish to Maven Central - cryptography
        if: ${{ inputs.dry-run-enabled != 'true' && !cancelled() && !failure() }}
        env:
          NEXUS_USERNAME: ${{ secrets.SVCS_OSSRH_USER_NAME }}
          NEXUS_PASSWORD: ${{ secrets.SVCS_OSSRH_USER_PASSWORD }}
        run: ./gradlew releaseMavenCentral -PpublishingPackageGroup=com.hedera.cryptography -PpublishSigningEnabled=true --no-configuration-cache

      # DRY RUN Publishes the snapshot artifacts to the Maven Central Nexus staging repository.
      - name: Dry Run Snapshot Gradle Publish to Maven Central - common
        if: ${{ inputs.dry-run-enabled == 'true' && !cancelled() && !failure() }}
        env:
          NEXUS_USERNAME: ${{ secrets.SVCS_OSSRH_USER_NAME }}
          NEXUS_PASSWORD: ${{ secrets.SVCS_OSSRH_USER_PASSWORD }}
        run: ./gradlew releaseMavenCentral -PpublishingPackageGroup=com.hedera.common -PpublishSigningEnabled=true --no-configuration-cache -PpublishTestRelease=true

      - name: Dry Run Snapshot Gradle Publish to Maven Central - cryptography
        if: ${{ inputs.dry-run-enabled == 'true' && !cancelled() && !failure() }}
        env:
          NEXUS_USERNAME: ${{ secrets.SVCS_OSSRH_USER_NAME }}
          NEXUS_PASSWORD: ${{ secrets.SVCS_OSSRH_USER_PASSWORD }}
        run: ./gradlew releaseMavenCentral -PpublishingPackageGroup=com.hedera.cryptography -PpublishSigningEnabled=true --no-configuration-cache -PpublishTestRelease=true
