# SPDX-License-Identifier: Apache-2.0
name: "Publish Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "Github branch (should always be main unless testing workflow changes) to release from:"
        type: string
        required: false
        default: "main"
      dry-run-enabled:
        description: "Perform Dry Run (Checks new semantic release version and confirms gradle assemble is successful):"
        type: boolean
        required: false
        default: false
      java-distribution:
        description: "Java JDK Distribution:"
        type: string
        required: false
        default: "temurin"
      java-version:
        description: "Java JDK Version:"
        type: string
        required: false
        default: "21.0.4"
      gradle-version:
        description: "Gradle Version:"
        type: string
        required: false
        default: "wrapper"

defaults:
  run:
    shell: bash

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  LC_ALL: C.UTF-8
  GRADLE_CACHE_USERNAME: ${{ secrets.GRADLE_CACHE_USERNAME }}
  GRADLE_CACHE_PASSWORD: ${{ secrets.GRADLE_CACHE_PASSWORD }}

