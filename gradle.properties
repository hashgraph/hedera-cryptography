# Need increased heap for running Gradle itself, or SonarQube will run the JVM out of metaspace
org.gradle.jvmargs=-Xmx2048m

# Enable Gradle Caching
org.gradle.caching=true
org.gradle.configuration-cache=true

# Disable parallel workers
# If/when we upgrade to cargo-zigbuild 0.20.0, it fails with parallel workers.
# See https://github.com/rust-cross/cargo-zigbuild/issues/348
# But even before the upgrade, builds seem to run faster this way.
org.gradle.parallel=false
